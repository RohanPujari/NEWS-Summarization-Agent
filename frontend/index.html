<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Summarizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: center; }
        h1 { color: #667eea; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 5px; }
        input:focus { outline: none; border-color: #667eea; }
        button { padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #5568d3; }
        .article-card { background: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .article-card:hover { transform: translateY(-5px); box-shadow: 0 8px 12px rgba(0,0,0,0.15); }
        .article-title { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
        .article-meta { font-size: 12px; color: #999; margin-bottom: 15px; }
        .article-summary { color: #666; line-height: 1.6; margin-bottom: 15px; }
        .article-footer { display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .read-more { color: #667eea; text-decoration: none; font-weight: 500; }
        .star { cursor: pointer; font-size: 16px; margin-left: 5px; }
        .star.active { color: #ffc107; }
        .loading { text-align: center; padding: 40px; color: white; }
        .empty { text-align: center; padding: 40px; background: white; border-radius: 10px; color: #999; }
        @media (max-width: 600px) { .controls { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 News Summarizer</h1>
            <p>AI-powered news summaries updated every 2 hours</p>
        </header>
        
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search articles...">
            <button onclick="fetchNow()">Fetch Now</button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">Loading...</div>
        <div id="articles"></div>
        <div id="empty" class="empty" style="display: none;">No articles found</div>
    </div>
    
    <script>
        async function loadArticles(search = '') {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('articles').innerHTML = '';
            
            try {
                const url = `/api/articles${search ? '?search=' + search : ''}`;
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (!data.articles || data.articles.length === 0) {
                    document.getElementById('empty').style.display = 'block';
                    return;
                }
                
                const html = data.articles.map(a => `
                    <div class="article-card">
                        <h2 class="article-title">${a.title}</h2>
                        <div class="article-meta">${a.source} • ${new Date(a.published_at).toLocaleDateString()}</div>
                        <p class="article-summary">${a.summary}</p>
                        <div class="article-footer">
                            <a href="${a.url}" target="_blank" class="read-more">Read More →</a>
                            <div onclick="rate(event, ${a.id})">
                                ${[1,2,3,4,5].map(i => `<span class="star" data-rating="${i}">★</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('articles').innerHTML = html;
            } catch (e) {
                document.getElementById('loading').innerHTML = 'Error: ' + e.message;
            }
        }
        
        async function fetchNow() {
            const response = await fetch('/api/fetch-now');
            const data = await response.json();
            alert(data.message);
            loadArticles();
        }
        
        async function rate(e, id) {
            if (e.target.classList.contains('star')) {
                const rating = parseInt(e.target.dataset.rating);
                await fetch('/api/rate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ article_id: id, rating })
                });
                e.target.closest('div').querySelectorAll('.star').forEach(s => {
                    s.classList.toggle('active', parseInt(s.dataset.rating) <= rating);
                });
            }
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => loadArticles(e.target.value));
        loadArticles();
    </script>
</body>
</html>
